<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newson Sportec Scientific Calculator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    .poster-wrapper {
      position: relative;
      width: min(100vw, 1122px);
      aspect-ratio: 1122 / 1402;
      background-image: url("calculator-poster.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    /* Main calculator position on the poster */
    .calculator-area {
      position: absolute;
      left: 7.7%;
      top: 39.0%;
      width: 60.5%;
      height: 45.6%;
      background: rgba(250, 250, 252, 0.98);
      border: 4px solid rgba(255, 255, 255, 0.95);
      border-radius: 26px;
      padding: 10px;
      box-shadow:
        0 12px 30px rgba(0, 0, 0, 0.45),
        inset 0 0 0 1px rgba(255, 255, 255, 0.8);
      z-index: 5;
    }

    .calculator-shell {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: linear-gradient(180deg, #25282f 0%, #14161b 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.03),
        0 8px 18px rgba(0, 0, 0, 0.35);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: white;
      min-height: 0;
    }

    .calc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-icon {
      width: 0;
      height: 0;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-left: 16px solid #f36a21;
      transform: skewX(-12deg);
      flex-shrink: 0;
    }

    .brand-text {
      line-height: 1;
      min-width: 0;
    }

    .brand-text .title {
      font-size: clamp(14px, 1.8vw, 28px);
      font-weight: 900;
      letter-spacing: 1px;
      font-style: italic;
      white-space: nowrap;
    }

    .brand-text .subtitle {
      font-size: clamp(10px, 1vw, 14px);
      color: #f36a21;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-top: 4px;
      white-space: nowrap;
    }

    .brand-text .caption {
      font-size: clamp(9px, 0.95vw, 13px);
      color: #c8c8c8;
      margin-top: 4px;
      white-space: nowrap;
    }

    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 6px 10px;
      flex-shrink: 0;
    }

    .mode-toggle label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: clamp(11px, 1vw, 14px);
      cursor: pointer;
      color: #f5f5f5;
    }

    .mode-toggle input[type="radio"] {
      accent-color: #f36a21;
      cursor: pointer;
    }

    .display-panel {
      background: linear-gradient(180deg, #111318 0%, #0c0d11 100%);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 16px;
      padding: 10px 12px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .screen-label {
      font-size: clamp(10px, 0.95vw, 13px);
      color: #d0d0d0;
      letter-spacing: 1px;
    }

    .expression-screen {
      font-size: clamp(12px, 1.1vw, 16px);
      color: #d5d5d5;
      text-align: right;
      min-height: 22px;
      word-wrap: break-word;
      overflow-wrap: anywhere;
      margin-top: 4px;
    }

    .result-screen {
      font-size: clamp(28px, 4vw, 56px);
      font-weight: 900;
      text-align: right;
      color: white;
      min-height: 44px;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    .mini-tools {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .button-grid {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-auto-rows: minmax(0, 1fr);
      gap: 6px;
    }

    button {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: #f7f7f7;
      font-weight: 800;
      font-size: clamp(11px, 1.2vw, 20px);
      background: linear-gradient(180deg, #2f3440 0%, #1b1f28 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.08),
        0 3px 6px rgba(0, 0, 0, 0.28);
      transition: transform 0.12s ease, filter 0.12s ease;
      min-height: 38px;
      padding: 0 4px;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    button:active {
      transform: scale(0.97);
    }

    .mini-btn {
      background: linear-gradient(180deg, #3a404d 0%, #242933 100%);
      font-size: clamp(10px, 1vw, 14px);
      min-height: 34px;
    }

    .scientific-btn {
      background: linear-gradient(180deg, #363d4a 0%, #212732 100%);
      color: #e5e5e5;
    }

    .number-btn {
      background: linear-gradient(180deg, #434c5d 0%, #2e3746 100%);
      color: #ffffff;
    }

    .operator-btn {
      background: linear-gradient(180deg, #ff7a32 0%, #e25510 100%);
      color: white;
    }

    .action-btn {
      background: linear-gradient(180deg, #53637c 0%, #38475d 100%);
      color: white;
    }

    .equal-btn {
      grid-column: span 8;
      background: linear-gradient(180deg, #ff7d35 0%, #df4c0b 100%);
      color: white;
      font-size: clamp(16px, 1.6vw, 24px);
      min-height: 42px;
      letter-spacing: 1px;
    }

    .helper-note {
      font-size: clamp(8px, 0.8vw, 11px);
      color: #c8c8c8;
      text-align: center;
      margin-top: 1px;
    }

    @media (max-width: 900px) {
      .calculator-area {
        padding: 8px;
        border-radius: 18px;
      }

      .calculator-shell {
        padding: 8px;
        border-radius: 14px;
      }

      .display-panel {
        min-height: 78px;
      }

      .result-screen {
        font-size: clamp(20px, 3.5vw, 38px);
      }

      .mini-tools,
      .button-grid {
        gap: 5px;
      }

      button {
        border-radius: 9px;
        min-height: 30px;
      }
    }

    @media (max-width: 600px) {
      body {
        align-items: flex-start;
      }

      .poster-wrapper {
        width: 100vw;
      }

      .calculator-area {
        left: 7.7%;
        top: 39.0%;
        width: 60.5%;
        height: 45.6%;
      }

      .mini-tools {
        grid-template-columns: repeat(4, 1fr);
      }

      .button-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .equal-btn {
        grid-column: span 4;
      }

      .mode-toggle {
        width: 100%;
        justify-content: center;
      }

      .display-panel {
        min-height: 70px;
      }
    }
  </style>
</head>
<body>

  <div class="poster-wrapper">
    <div class="calculator-area">
      <div class="calculator-shell">

        <div class="calc-header">
          <div class="brand-wrap">
            <div class="brand-icon"></div>

            <div class="brand-text">
              <div class="title">NEWSON SPORTEC</div>
              <div class="subtitle">Scientific Calculator</div>
              <div class="caption">Original custom layout for your website</div>
            </div>
          </div>

          <div class="mode-toggle">
            <label>
              <input type="radio" name="angleMode" value="deg" checked />
              Deg
            </label>

            <label>
              <input type="radio" name="angleMode" value="rad" />
              Rad
            </label>
          </div>
        </div>

        <div class="display-panel">
          <div class="screen-label">EXPRESSION</div>
          <div id="expression" class="expression-screen">0</div>
          <div id="result" class="result-screen">0</div>
        </div>

        <div class="mini-tools">
          <button class="mini-btn action-btn" onclick="useAnswer()">Ans</button>
          <button class="mini-btn action-btn" onclick="backspace()">Back</button>
          <button class="mini-btn action-btn" onclick="clearAll()">AC</button>
          <button class="mini-btn action-btn" onclick="memoryRecall()">MR</button>
          <button class="mini-btn action-btn" onclick="memoryStore()">MS</button>
          <button class="mini-btn action-btn" onclick="memoryAdd()">M+</button>
          <button class="mini-btn action-btn" onclick="memorySubtract()">M-</button>
        </div>

        <div class="button-grid">
          <!-- Row 1 -->
          <button class="scientific-btn" onclick="appendToken('sin(')">sin</button>
          <button class="scientific-btn" onclick="appendToken('cos(')">cos</button>
          <button class="scientific-btn" onclick="appendToken('tan(')">tan</button>
          <button class="scientific-btn" onclick="appendToken('asin(')">sin<sup>-1</sup></button>
          <button class="scientific-btn" onclick="appendToken('acos(')">cos<sup>-1</sup></button>
          <button class="scientific-btn" onclick="appendToken('atan(')">tan<sup>-1</sup></button>
          <button class="scientific-btn" onclick="appendToken('(')">(</button>
          <button class="scientific-btn" onclick="appendToken(')')">)</button>

          <!-- Row 2 -->
          <button class="scientific-btn" onclick="appendToken('^')">x<sup>y</sup></button>
          <button class="scientific-btn" onclick="appendToken('^2')">x<sup>2</sup></button>
          <button class="scientific-btn" onclick="appendToken('^3')">x<sup>3</sup></button>
          <button class="scientific-btn" onclick="appendToken('sqrt(')">√x</button>
          <button class="scientific-btn" onclick="appendToken('cbrt(')">³√x</button>
          <button class="scientific-btn" onclick="appendToken('root(')">y√x</button>
          <button class="scientific-btn" onclick="appendToken('recip(')">1/x</button>
          <button class="scientific-btn" onclick="applyPercent()">%</button>

          <!-- Row 3 -->
          <button class="scientific-btn" onclick="appendToken('π')">π</button>
          <button class="scientific-btn" onclick="appendToken('ℯ')">e</button>
          <button class="scientific-btn" onclick="appendToken('ln(')">ln</button>
          <button class="scientific-btn" onclick="appendToken('log(')">log</button>
          <button class="scientific-btn" onclick="appendToken('ℯ^(')">e<sup>x</sup></button>
          <button class="scientific-btn" onclick="appendToken('10^(')">10<sup>x</sup></button>
          <button class="scientific-btn" onclick="addScientificNotation()">EXP</button>
          <button class="scientific-btn" onclick="appendToken('fact(')">n!</button>

          <!-- Row 4 -->
          <button class="number-btn" onclick="appendToken('7')">7</button>
          <button class="number-btn" onclick="appendToken('8')">8</button>
          <button class="number-btn" onclick="appendToken('9')">9</button>
          <button class="operator-btn" onclick="appendToken('÷')">÷</button>
          <button class="number-btn" onclick="appendToken('4')">4</button>
          <button class="number-btn" onclick="appendToken('5')">5</button>
          <button class="number-btn" onclick="appendToken('6')">6</button>
          <button class="operator-btn" onclick="appendToken('×')">×</button>

          <!-- Row 5 -->
          <button class="number-btn" onclick="appendToken('1')">1</button>
          <button class="number-btn" onclick="appendToken('2')">2</button>
          <button class="number-btn" onclick="appendToken('3')">3</button>
          <button class="operator-btn" onclick="appendToken('−')">−</button>
          <button class="number-btn" onclick="appendToken('0')">0</button>
          <button class="number-btn" onclick="appendToken('.')">.</button>
          <button class="action-btn" onclick="toggleSign()">±</button>
          <button class="operator-btn" onclick="appendToken('+')">+</button>

          <!-- Row 6 -->
          <button class="equal-btn" onclick="calculate()">= CALCULATE =</button>
        </div>

        <div class="helper-note">
          Tip: y√x uses root(n,x). Example: root(3,27)
        </div>

      </div>
    </div>
  </div>

  <script>
    const expressionEl = document.getElementById("expression");
    const resultEl = document.getElementById("result");

    let expression = "";
    let lastAnswer = 0;
    let memoryValue = 0;

    function updateDisplay() {
      expressionEl.textContent = expression || "0";
    }

    function appendToken(token) {
      expression += token;
      updateDisplay();
    }

    function clearAll() {
      expression = "";
      expressionEl.textContent = "0";
      resultEl.textContent = "0";
    }

    function backspace() {
      expression = expression.slice(0, -1);
      updateDisplay();
    }

    function useAnswer() {
      appendToken(String(lastAnswer));
    }

    function toggleSign() {
      if (!expression) return;

      if (expression.startsWith("-")) {
        expression = expression.slice(1);
      } else {
        expression = "-" + expression;
      }

      updateDisplay();
    }

    function applyPercent() {
      if (!expression) return;
      expression = "(" + expression + ")/100";
      updateDisplay();
    }

    function addScientificNotation() {
      if (!expression) {
        expression = "1E";
      } else {
        expression += "E";
      }
      updateDisplay();
    }

    function memoryStore() {
      try {
        memoryValue = evaluateExpression(expression || String(lastAnswer));
      } catch {
        memoryValue = lastAnswer;
      }
    }

    function memoryRecall() {
      appendToken(String(memoryValue));
    }

    function memoryAdd() {
      try {
        memoryValue += evaluateExpression(expression || "0");
      } catch {
        // do nothing
      }
    }

    function memorySubtract() {
      try {
        memoryValue -= evaluateExpression(expression || "0");
      } catch {
        // do nothing
      }
    }

    function formatNumber(value) {
      if (!Number.isFinite(value)) return "Error";

      const absValue = Math.abs(value);

      if ((absValue !== 0 && absValue < 0.0000001) || absValue >= 1000000000000) {
        return value.toExponential(8);
      }

      return parseFloat(Number(value).toPrecision(12)).toString();
    }

    function factorial(n) {
      if (n < 0 || !Number.isInteger(n)) {
        throw new Error("Factorial only works for whole numbers 0 and above.");
      }

      let result = 1;
      for (let i = 2; i <= n; i++) {
        result *= i;
      }
      return result;
    }

    function evaluateExpression(expr) {
      const mode = document.querySelector('input[name="angleMode"]:checked').value;

      const sin = (x) => mode === "deg" ? Math.sin(x * Math.PI / 180) : Math.sin(x);
      const cos = (x) => mode === "deg" ? Math.cos(x * Math.PI / 180) : Math.cos(x);
      const tan = (x) => mode === "deg" ? Math.tan(x * Math.PI / 180) : Math.tan(x);

      const asin = (x) => mode === "deg" ? Math.asin(x) * 180 / Math.PI : Math.asin(x);
      const acos = (x) => mode === "deg" ? Math.acos(x) * 180 / Math.PI : Math.acos(x);
      const atan = (x) => mode === "deg" ? Math.atan(x) * 180 / Math.PI : Math.atan(x);

      const ln = (x) => Math.log(x);
      const log = (x) => Math.log10(x);
      const sqrt = (x) => Math.sqrt(x);
      const cbrt = (x) => Math.cbrt(x);
      const root = (n, x) => Math.pow(x, 1 / n);
      const recip = (x) => 1 / x;
      const fact = (x) => factorial(x);

      let jsExpr = expr
        .replace(/Ans/g, "Ans")
        .replace(/π/g, "PI")
        .replace(/ℯ/g, "ECONST")
        .replace(/÷/g, "/")
        .replace(/×/g, "*")
        .replace(/−/g, "-")
        .replace(/\^/g, "**")
        .replace(/(\d+(\.\d+)?)E([+-]?\d+(\.\d+)?)/g, "($1*10**$3)");

      const result = Function(
        "sin", "cos", "tan",
        "asin", "acos", "atan",
        "ln", "log",
        "sqrt", "cbrt", "root",
        "recip", "fact",
        "PI", "ECONST", "Ans",
        `"use strict"; return (${jsExpr});`
      )(
        sin, cos, tan,
        asin, acos, atan,
        ln, log,
        sqrt, cbrt, root,
        recip, fact,
        Math.PI, Math.E, lastAnswer
      );

      return result;
    }

    function calculate() {
      try {
        const result = evaluateExpression(expression || "0");

        if (!Number.isFinite(result)) {
          throw new Error("Invalid result");
        }

        lastAnswer = result;
        resultEl.textContent = formatNumber(result);
        expression = String(result);
        updateDisplay();
      } catch (error) {
        resultEl.textContent = "Error";
        expressionEl.textContent = "Check expression";
        expression = "";
      }
    }

    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if (/[0-9]/.test(key)) {
        appendToken(key);
      } else if (key === "+") {
        appendToken("+");
      } else if (key === "-") {
        appendToken("−");
      } else if (key === "*") {
        appendToken("×");
      } else if (key === "/") {
        appendToken("÷");
      } else if (key === ".") {
        appendToken(".");
      } else if (key === "(" || key === ")") {
        appendToken(key);
      } else if (key === "Enter") {
        event.preventDefault();
        calculate();
      } else if (key === "Backspace") {
        event.preventDefault();
        backspace();
      } else if (key === "Escape") {
        event.preventDefault();
        clearAll();
      }
    });

    updateDisplay();
  </script>
</body>
</html>
