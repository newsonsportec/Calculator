<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Newson Sportec Scientific Calculator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #050505;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    .poster-wrapper {
      position: relative;
      width: min(100vw, 1122px);
      aspect-ratio: 1122 / 1402;
      background-image: url("calculator-poster.png");
      background-size: contain;
      background-position: top center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    .calculator-area {
      position: absolute;
      left: 7.7%;
      top: 39.2%;
      width: 60.8%;
      height: 45.2%;
      background: #ffffff;
      border: 4px solid #f2f2f2;
      border-radius: 26px;
      padding: 10px;
      box-shadow:
        0 12px 30px rgba(0, 0, 0, 0.48),
        inset 0 0 0 1px rgba(255, 255, 255, 0.9);
      z-index: 5;
    }

    .calculator-shell {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #24272f 0%, #111318 100%);
      border-radius: 20px;
      padding: 13px;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 9px;
      overflow: hidden;
      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.04),
        0 6px 16px rgba(0, 0, 0, 0.35);
    }

    .calc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .brand-icon {
      width: 0;
      height: 0;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-left: 18px solid #f15a18;
      transform: skewX(-10deg);
      flex-shrink: 0;
    }

    .brand-text {
      line-height: 1;
      min-width: 0;
    }

    .brand-title {
      font-size: clamp(13px, 1.8vw, 25px);
      font-weight: 900;
      font-style: italic;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .brand-subtitle {
      color: #f15a18;
      font-size: clamp(9px, 1vw, 14px);
      font-weight: 800;
      margin-top: 4px;
      letter-spacing: 0.6px;
      white-space: nowrap;
    }

    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 6px 9px;
      flex-shrink: 0;
    }

    .mode-toggle label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: clamp(10px, 1vw, 14px);
      font-weight: 700;
      cursor: pointer;
    }

    .mode-toggle input {
      accent-color: #f15a18;
    }

    .display-panel {
      background: linear-gradient(180deg, #101217 0%, #090a0d 100%);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 16px;
      padding: 10px 12px;
      flex: 0 0 auto;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .screen-label {
      font-size: clamp(9px, 0.95vw, 13px);
      color: #d6d6d6;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .expression-screen {
      min-height: 18px;
      color: #cfcfcf;
      text-align: right;
      font-size: clamp(11px, 1vw, 15px);
      overflow-wrap: anywhere;
    }

    .result-screen {
      color: #ffffff;
      text-align: right;
      font-size: clamp(24px, 4vw, 55px);
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .top-tools {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      flex: 0 0 auto;
    }

    .main-grid {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(7, 1fr);
      gap: 7px;
    }

    button {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: #ffffff;
      font-weight: 900;
      font-size: clamp(13px, 1.55vw, 25px);
      min-height: 0;
      padding: 0 4px;
      background: linear-gradient(180deg, #343a46 0%, #1f2530 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.10),
        0 3px 7px rgba(0, 0, 0, 0.34);
      transition: 0.12s ease;
      touch-action: manipulation;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    button:active {
      transform: scale(0.97);
    }

    .tool-btn {
      background: linear-gradient(180deg, #4d5a70 0%, #303b4d 100%);
      font-size: clamp(11px, 1.2vw, 18px);
    }

    .science-btn {
      background: linear-gradient(180deg, #333946 0%, #202633 100%);
      color: #f2f2f2;
      font-size: clamp(12px, 1.35vw, 22px);
    }

    .number-btn {
      background: linear-gradient(180deg, #485266 0%, #303a4d 100%);
      color: #ffffff;
      font-size: clamp(16px, 1.9vw, 30px);
    }

    .operator-btn {
      background: linear-gradient(180deg, #ff742d 0%, #e54c0d 100%);
      color: #ffffff;
      font-size: clamp(18px, 2.3vw, 36px);
    }

    .equal-btn {
      background: linear-gradient(180deg, #ff8a3d 0%, #df4a0b 100%);
      color: #ffffff;
      font-size: clamp(18px, 2.3vw, 36px);
    }

    .clear-btn {
      background: linear-gradient(180deg, #707f98 0%, #3f5068 100%);
    }

    .zero-btn {
      grid-column: span 2;
    }

    .note {
      flex: 0 0 auto;
      text-align: center;
      color: #cfcfcf;
      font-size: clamp(8px, 0.8vw, 11px);
      line-height: 1.2;
    }

    @media (max-width: 900px) {
      .calculator-area {
        padding: 8px;
        border-radius: 19px;
      }

      .calculator-shell {
        padding: 9px;
        border-radius: 15px;
        gap: 6px;
      }

      .display-panel {
        min-height: 68px;
        padding: 8px;
      }

      .top-tools,
      .main-grid {
        gap: 5px;
      }

      button {
        border-radius: 9px;
      }
    }

    @media (max-width: 600px) {
      .poster-wrapper {
        width: 100vw;
        max-width: 100vw;
      }

      .calculator-area {
        left: 7.7%;
        top: 39.2%;
        width: 57%;
        height: 39.5%;
        padding: 5px;
        border-width: 2px;
        border-radius: 13px;
      }

      .calculator-shell {
        padding: 5px;
        border-radius: 10px;
        gap: 4px;
      }

      .brand-wrap {
        gap: 4px;
      }

      .brand-icon {
        border-top-width: 7px;
        border-bottom-width: 7px;
        border-left-width: 11px;
      }

      .brand-title {
        font-size: 7.5px;
        letter-spacing: 0.4px;
      }

      .brand-subtitle {
        font-size: 5.8px;
        margin-top: 2px;
        letter-spacing: 0.2px;
      }

      .mode-toggle {
        padding: 2px 3px;
        gap: 2px;
        border-radius: 7px;
      }

      .mode-toggle label {
        font-size: 6px;
        gap: 1px;
      }

      .mode-toggle input {
        width: 8px;
        height: 8px;
      }

      .display-panel {
        min-height: 40px;
        padding: 4px 5px;
        border-radius: 8px;
      }

      .screen-label {
        font-size: 5.8px;
        letter-spacing: 0.5px;
      }

      .expression-screen {
        min-height: 9px;
        font-size: 6.5px;
      }

      .result-screen {
        font-size: 13px;
      }

      .top-tools,
      .main-grid {
        gap: 3px;
      }

      button {
        border-radius: 5px;
        padding: 0 1px;
        font-size: 8px;
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.08),
          0 1px 3px rgba(0, 0, 0, 0.25);
      }

      .tool-btn {
        font-size: 6.2px;
      }

      .science-btn {
        font-size: 6.8px;
      }

      .number-btn {
        font-size: 8.8px;
      }

      .operator-btn,
      .equal-btn {
        font-size: 10px;
      }

      .note {
        display: none;
      }
    }

    @media (max-width: 390px) {
      .calculator-area {
        width: 55.5%;
        height: 38.5%;
      }

      button {
        font-size: 7.2px;
      }

      .number-btn {
        font-size: 8px;
      }

      .operator-btn,
      .equal-btn {
        font-size: 9px;
      }
    }
  </style>
</head>

<body>

  <div class="poster-wrapper">
    <div class="calculator-area">
      <div class="calculator-shell">

        <div class="calc-header">
          <div class="brand-wrap">
            <div class="brand-icon"></div>
            <div class="brand-text">
              <div class="brand-title">NEWSON SPORTEC</div>
              <div class="brand-subtitle">SCIENTIFIC CALCULATOR</div>
            </div>
          </div>

          <div class="mode-toggle">
            <label>
              <input type="radio" name="angleMode" value="deg" checked />
              Deg
            </label>
            <label>
              <input type="radio" name="angleMode" value="rad" />
              Rad
            </label>
          </div>
        </div>

        <div class="display-panel">
          <div class="screen-label">RESULT</div>
          <div id="expression" class="expression-screen">0</div>
          <div id="result" class="result-screen">0</div>
        </div>

        <div class="top-tools">
          <button class="tool-btn" onclick="useAnswer()">Ans</button>
          <button class="tool-btn" onclick="backspace()">Back</button>
          <button class="tool-btn clear-btn" onclick="clearAll()">AC</button>
          <button class="tool-btn" onclick="memoryStore()">MS</button>
          <button class="tool-btn" onclick="memoryRecall()">MR</button>
        </div>

        <div class="main-grid">

          <button class="science-btn" onclick="appendToken('sin(')">sin</button>
          <button class="science-btn" onclick="appendToken('cos(')">cos</button>
          <button class="science-btn" onclick="appendToken('tan(')">tan</button>
          <button class="science-btn" onclick="appendToken('π')">π</button>
          <button class="operator-btn" onclick="appendToken('÷')">÷</button>

          <button class="science-btn" onclick="appendToken('asin(')">sin⁻¹</button>
          <button class="science-btn" onclick="appendToken('acos(')">cos⁻¹</button>
          <button class="science-btn" onclick="appendToken('atan(')">tan⁻¹</button>
          <button class="science-btn" onclick="appendToken('ℯ')">e</button>
          <button class="operator-btn" onclick="appendToken('×')">×</button>

          <button class="science-btn" onclick="appendToken('^2')">x²</button>
          <button class="science-btn" onclick="appendToken('^3')">x³</button>
          <button class="science-btn" onclick="appendToken('sqrt(')">√</button>
          <button class="science-btn" onclick="appendToken('log(')">log</button>
          <button class="operator-btn" onclick="appendToken('−')">−</button>

          <button class="number-btn" onclick="appendToken('7')">7</button>
          <button class="number-btn" onclick="appendToken('8')">8</button>
          <button class="number-btn" onclick="appendToken('9')">9</button>
          <button class="science-btn" onclick="appendToken('ln(')">ln</button>
          <button class="operator-btn" onclick="appendToken('+')">+</button>

          <button class="number-btn" onclick="appendToken('4')">4</button>
          <button class="number-btn" onclick="appendToken('5')">5</button>
          <button class="number-btn" onclick="appendToken('6')">6</button>
          <button class="science-btn" onclick="appendToken('(')">(</button>
          <button class="equal-btn" onclick="calculate()">=</button>

          <button class="number-btn" onclick="appendToken('1')">1</button>
          <button class="number-btn" onclick="appendToken('2')">2</button>
          <button class="number-btn" onclick="appendToken('3')">3</button>
          <button class="science-btn" onclick="appendToken(')')">)</button>
          <button class="science-btn" onclick="applyPercent()">%</button>

          <button class="number-btn zero-btn" onclick="appendToken('0')">0</button>
          <button class="number-btn" onclick="appendToken('.')">.</button>
          <button class="science-btn" onclick="toggleSign()">±</button>
          <button class="science-btn" onclick="appendToken('^')">xʸ</button>

        </div>

        <div class="note">
          Operators are grouped on the right side: ÷ × − + =
        </div>

      </div>
    </div>
  </div>

  <script>
    const expressionEl = document.getElementById("expression");
    const resultEl = document.getElementById("result");

    let expression = "";
    let lastAnswer = 0;
    let memoryValue = 0;

    function updateDisplay() {
      expressionEl.textContent = expression || "0";
    }

    function appendToken(token) {
      if (expression === "Error") {
        expression = "";
      }

      expression += token;
      updateDisplay();
    }

    function clearAll() {
      expression = "";
      resultEl.textContent = "0";
      expressionEl.textContent = "0";
    }

    function backspace() {
      expression = expression.slice(0, -1);
      updateDisplay();
    }

    function useAnswer() {
      appendToken(String(lastAnswer));
    }

    function memoryStore() {
      try {
        memoryValue = evaluateExpression(expression || String(lastAnswer));
      } catch {
        memoryValue = lastAnswer;
      }
    }

    function memoryRecall() {
      appendToken(String(memoryValue));
    }

    function toggleSign() {
      if (!expression) return;

      if (expression.startsWith("-")) {
        expression = expression.slice(1);
      } else {
        expression = "-" + expression;
      }

      updateDisplay();
    }

    function applyPercent() {
      if (!expression) return;
      expression = "(" + expression + ")/100";
      updateDisplay();
    }

    function formatNumber(value) {
      if (!Number.isFinite(value)) return "Error";

      const absValue = Math.abs(value);

      if ((absValue !== 0 && absValue < 0.0000001) || absValue >= 1000000000000) {
        return value.toExponential(8);
      }

      return parseFloat(Number(value).toPrecision(12)).toString();
    }

    function evaluateExpression(expr) {
      const mode = document.querySelector('input[name="angleMode"]:checked').value;

      const sin = x => mode === "deg" ? Math.sin(x * Math.PI / 180) : Math.sin(x);
      const cos = x => mode === "deg" ? Math.cos(x * Math.PI / 180) : Math.cos(x);
      const tan = x => mode === "deg" ? Math.tan(x * Math.PI / 180) : Math.tan(x);

      const asin = x => mode === "deg" ? Math.asin(x) * 180 / Math.PI : Math.asin(x);
      const acos = x => mode === "deg" ? Math.acos(x) * 180 / Math.PI : Math.acos(x);
      const atan = x => mode === "deg" ? Math.atan(x) * 180 / Math.PI : Math.atan(x);

      const ln = x => Math.log(x);
      const log = x => Math.log10(x);
      const sqrt = x => Math.sqrt(x);

      let jsExpr = expr
        .replace(/π/g, "PI")
        .replace(/ℯ/g, "E")
        .replace(/÷/g, "/")
        .replace(/×/g, "*")
        .replace(/−/g, "-")
        .replace(/\^/g, "**");

      const result = Function(
        "sin", "cos", "tan",
        "asin", "acos", "atan",
        "ln", "log", "sqrt",
        "PI", "E", "Ans",
        `"use strict"; return (${jsExpr});`
      )(
        sin, cos, tan,
        asin, acos, atan,
        ln, log, sqrt,
        Math.PI, Math.E, lastAnswer
      );

      return result;
    }

    function calculate() {
      try {
        const result = evaluateExpression(expression || "0");

        if (!Number.isFinite(result)) {
          throw new Error("Invalid result");
        }

        lastAnswer = result;
        resultEl.textContent = formatNumber(result);
        expression = String(result);
        updateDisplay();
      } catch {
        resultEl.textContent = "Error";
        expressionEl.textContent = "Check expression";
        expression = "";
      }
    }

    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if (/[0-9]/.test(key)) appendToken(key);
      if (key === "+") appendToken("+");
      if (key === "-") appendToken("−");
      if (key === "*") appendToken("×");
      if (key === "/") appendToken("÷");
      if (key === ".") appendToken(".");
      if (key === "(" || key === ")") appendToken(key);

      if (key === "Enter") {
        event.preventDefault();
        calculate();
      }

      if (key === "Backspace") {
        event.preventDefault();
        backspace();
      }

      if (key === "Escape") {
        event.preventDefault();
        clearAll();
      }
    });

    updateDisplay();
  </script>

</body>
</html>
