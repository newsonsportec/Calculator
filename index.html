<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newson Sportec Calculator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050505;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .poster-wrapper {
      position: relative;
      width: min(100vw, 1122px);
      aspect-ratio: 1122 / 1402;
      background-image: url("calculator-poster.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    /* BIGGER calculator area */
    .calculator-area {
      position: absolute;
      left: 7.8%;
      top: 35.8%;
      width: 59.5%;
      height: 48.3%;
      background: #ffffff;
      border: 4px solid #e8e8e8;
      border-radius: 24px;
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.45),
        inset 0 0 0 1px rgba(255, 255, 255, 0.95);
      padding: 14px;
      overflow: hidden;
      z-index: 5;
    }

    .calculator-shell {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #232323, #101010);
      border-radius: 18px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      padding: 14px;
      display: flex;
      flex-direction: column;
      color: white;
      box-shadow:
        inset 0 0 14px rgba(255, 255, 255, 0.04),
        0 4px 12px rgba(0, 0, 0, 0.45);
    }

    .calc-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      flex: 0 0 auto;
    }

    .brand {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #ffffff;
      font-style: italic;
      line-height: 1;
      font-size: clamp(11px, 1.8vw, 24px);
    }

    .brand-mark {
      color: #f15a18;
      font-size: clamp(18px, 2.3vw, 32px);
      line-height: 1;
      margin-top: 2px;
    }

    .brand small {
      display: block;
      color: #f15a18;
      font-size: 0.62em;
      margin-top: 3px;
      letter-spacing: 0.5px;
    }

    .icons {
      display: flex;
      gap: 12px;
      color: #ffffff;
      font-size: clamp(14px, 1.8vw, 24px);
      font-weight: bold;
      margin-top: 2px;
    }

    .display-box {
      background: #161616;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
      flex: 0 0 auto;
    }

    .display-label {
      font-size: clamp(9px, 1vw, 14px);
      color: #e0e0e0;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    #display {
      width: 100%;
      min-height: 72px;
      border: none;
      outline: none;
      background: transparent;
      color: #ffffff;
      text-align: right;
      font-size: clamp(28px, 4.8vw, 64px);
      font-weight: 800;
    }

    .memory-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 10px;
      flex: 0 0 auto;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      flex: 1 1 auto;
    }

    button {
      border: none;
      border-radius: 10px;
      background: linear-gradient(180deg, #2d2d2d, #161616);
      color: #f0f0f0;
      font-weight: 700;
      cursor: pointer;
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.10),
        0 2px 4px rgba(0, 0, 0, 0.45);
      transition: 0.15s;
      font-size: clamp(14px, 2vw, 32px);
      min-height: 52px;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    button:active {
      transform: scale(0.97);
    }

    .memory {
      font-size: clamp(10px, 1.1vw, 17px);
      min-height: 40px;
    }

    .operator,
    .equal {
      background: linear-gradient(180deg, #ff6e2a, #e24c12);
      color: white;
    }

    .zero {
      grid-column: span 2;
    }

    .equal-wide {
      grid-column: span 2;
    }

    .blank {
      visibility: hidden;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      .calculator-area {
        padding: 10px;
        border-radius: 18px;
      }

      .calculator-shell {
        padding: 10px;
        border-radius: 14px;
      }

      .memory-row,
      .button-grid {
        gap: 6px;
      }

      button {
        border-radius: 7px;
        min-height: 36px;
      }

      #display {
        min-height: 50px;
      }
    }

    @media (max-width: 600px) {
      body {
        align-items: flex-start;
      }

      .poster-wrapper {
        width: 100vw;
      }

      .calculator-area {
        left: 7.8%;
        top: 35.8%;
        width: 59.5%;
        height: 48.3%;
      }
    }
  </style>
</head>

<body>

  <div class="poster-wrapper">

    <div class="calculator-area">
      <div class="calculator-shell">

        <div class="calc-header">
          <div class="brand">
            <div class="brand-mark">▶</div>
            <div>
              NEWSON
              <small>SPORTEC</small>
            </div>
          </div>

          <div class="icons">
            <span>↺</span>
            <span>☰</span>
          </div>
        </div>

        <div class="display-box">
          <div class="display-label">RESULT</div>
          <input type="text" id="display" value="0" readonly />
        </div>

        <div class="memory-row">
          <button class="memory" onclick="memoryClear()">MC</button>
          <button class="memory" onclick="memoryRecall()">MR</button>
          <button class="memory" onclick="memoryAdd()">M+</button>
          <button class="memory" onclick="memorySubtract()">M−</button>
          <button class="memory" onclick="memoryStore()">MS</button>
        </div>

        <div class="button-grid">
          <button onclick="percent()">%</button>
          <button onclick="toggleSign()">+/−</button>
          <button onclick="appendValue('(')">(</button>
          <button onclick="appendValue(')')">)</button>
          <button class="operator" onclick="appendValue('/')">÷</button>

          <button onclick="appendValue('7')">7</button>
          <button onclick="appendValue('8')">8</button>
          <button onclick="appendValue('9')">9</button>
          <button class="blank"></button>
          <button class="operator" onclick="appendValue('*')">×</button>

          <button onclick="appendValue('4')">4</button>
          <button onclick="appendValue('5')">5</button>
          <button onclick="appendValue('6')">6</button>
          <button class="blank"></button>
          <button class="operator" onclick="appendValue('-')">−</button>

          <button onclick="appendValue('1')">1</button>
          <button onclick="appendValue('2')">2</button>
          <button onclick="appendValue('3')">3</button>
          <button class="blank"></button>
          <button class="operator" onclick="appendValue('+')">+</button>

          <button class="zero" onclick="appendValue('0')">0</button>
          <button onclick="appendValue('.')">.</button>
          <button class="equal equal-wide" onclick="calculate()">=</button>
        </div>

      </div>
    </div>

  </div>

  <script>
    const display = document.getElementById("display");
    let memoryValue = 0;

    function appendValue(value) {
      if (display.value === "0" || display.value === "Error") {
        display.value = value;
      } else {
        display.value += value;
      }
    }

    function clearDisplay() {
      display.value = "0";
    }

    function calculate() {
      try {
        let expression = display.value;

        if (!/^[0-9+\-*/().% ]+$/.test(expression)) {
          display.value = "Error";
          return;
        }

        let result = Function('"use strict"; return (' + expression + ')')();
        display.value = result;
      } catch {
        display.value = "Error";
      }
    }

    function percent() {
      try {
        let value = parseFloat(display.value);
        if (isNaN(value)) {
          display.value = "Error";
          return;
        }
        display.value = value / 100;
      } catch {
        display.value = "Error";
      }
    }

    function toggleSign() {
      if (display.value === "0" || display.value === "Error") return;

      if (display.value.startsWith("-")) {
        display.value = display.value.substring(1);
      } else {
        display.value = "-" + display.value;
      }
    }

    function memoryClear() {
      memoryValue = 0;
      clearDisplay();
    }

    function memoryRecall() {
      display.value = memoryValue.toString();
    }

    function memoryAdd() {
      let current = parseFloat(display.value);
      if (!isNaN(current)) {
        memoryValue += current;
      }
    }

    function memorySubtract() {
      let current = parseFloat(display.value);
      if (!isNaN(current)) {
        memoryValue -= current;
      }
    }

    function memoryStore() {
      let current = parseFloat(display.value);
      if (!isNaN(current)) {
        memoryValue = current;
      }
    }

    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if ("0123456789+-*/().".includes(key)) {
        appendValue(key);
      }

      if (key === "Enter") {
        calculate();
      }

      if (key === "Backspace") {
        if (display.value.length > 1 && display.value !== "Error") {
          display.value = display.value.slice(0, -1);
        } else {
          display.value = "0";
        }
      }

      if (key === "Escape") {
        clearDisplay();
      }
    });
  </script>

</body>
</html>
