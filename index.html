<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Newson Sportec Calculator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050505;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Main poster wrapper */
    .poster-wrapper {
      position: relative;
      width: min(100vw, 1122px);
      aspect-ratio: 1122 / 1402;
      background-image: url("calculator-poster.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    /*
      This calculator area covers the calculator printed in the image.
      If you need to move it:
      - change left
      - change top
      - change width
      - change height
    */
    .calculator-area {
      position: absolute;
      left: 9.1%;
      top: 38.4%;
      width: 49.2%;
      height: 40.2%;
      background: linear-gradient(180deg, #202020, #0f0f0f);
      border: 2px solid rgba(255, 255, 255, 0.22);
      border-radius: 2.2%;
      box-shadow:
        0 0 18px rgba(0, 0, 0, 0.85),
        inset 0 0 12px rgba(255, 255, 255, 0.06);
      padding: 2.1%;
      color: white;
    }

    .calc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.3%;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      letter-spacing: 1px;
      font-size: clamp(10px, 2vw, 22px);
      color: #ffffff;
      font-style: italic;
    }

    .brand-mark {
      color: #f24a16;
      font-size: clamp(16px, 3vw, 32px);
      line-height: 1;
    }

    .brand span {
      color: #f24a16;
      display: block;
      font-size: 0.62em;
      margin-top: -3px;
    }

    .icons {
      display: flex;
      gap: 14px;
      font-size: clamp(14px, 2.2vw, 26px);
      color: #ffffff;
    }

    .display-box {
      width: 100%;
      height: 19%;
      background: #1b1b1b;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 10px;
      padding: 3%;
      margin-bottom: 2.3%;
      box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
    }

    .display-label {
      font-size: clamp(8px, 1.2vw, 15px);
      color: #d9d9d9;
      letter-spacing: 1px;
      margin-bottom: 2%;
    }

    #display {
      width: 100%;
      background: transparent;
      border: none;
      color: #ffffff;
      text-align: right;
      font-size: clamp(24px, 5vw, 58px);
      font-weight: 800;
      outline: none;
    }

    .memory-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.3%;
      margin-bottom: 1.6%;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.3%;
      height: 59%;
    }

    button {
      border: none;
      border-radius: 8px;
      background: linear-gradient(180deg, #2b2b2b, #151515);
      color: #e8e8e8;
      font-weight: 700;
      font-size: clamp(14px, 2.8vw, 34px);
      cursor: pointer;
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.12),
        0 2px 4px rgba(0, 0, 0, 0.65);
      transition: 0.12s;
    }

    button:hover {
      filter: brightness(1.25);
      transform: translateY(-1px);
    }

    button:active {
      transform: scale(0.96);
    }

    .memory {
      height: clamp(24px, 4vw, 45px);
      font-size: clamp(9px, 1.6vw, 19px);
    }

    .operator,
    .equal {
      background: linear-gradient(180deg, #ff5a1f, #df330c);
      color: white;
    }

    .zero {
      grid-column: span 2;
    }

    .blank {
      visibility: hidden;
      pointer-events: none;
    }

    /* Phone adjustment */
    @media (max-width: 600px) {
      body {
        align-items: flex-start;
      }

      .poster-wrapper {
        width: 100vw;
      }

      .calculator-area {
        left: 9.1%;
        top: 38.4%;
        width: 49.2%;
        height: 40.2%;
        padding: 2%;
      }

      .icons {
        gap: 6px;
      }

      button {
        border-radius: 5px;
      }

      .display-box {
        border-radius: 6px;
      }
    }
  </style>
</head>

<body>

  <div class="poster-wrapper">

    <!-- Real working HTML calculator placed on top of the image calculator area -->
    <div class="calculator-area">

      <div class="calc-header">
        <div class="brand">
          <div class="brand-mark">▸</div>
          <div>
            NEWSON
            <span>SPORTEC</span>
          </div>
        </div>

        <div class="icons">
          <span>↺</span>
          <span>☰</span>
        </div>
      </div>

      <div class="display-box">
        <div class="display-label">RESULT</div>
        <input type="text" id="display" value="0" readonly />
      </div>

      <div class="memory-row">
        <button class="memory" onclick="clearDisplay()">MC</button>
        <button class="memory" onclick="clearDisplay()">MR</button>
        <button class="memory" onclick="appendValue('+')">M+</button>
        <button class="memory" onclick="appendValue('-')">M−</button>
        <button class="memory" onclick="clearDisplay()">MS</button>
      </div>

      <div class="button-grid">
        <button onclick="percent()">%</button>
        <button onclick="toggleSign()">+/−</button>
        <button onclick="appendValue('(')">(</button>
        <button onclick="appendValue(')')">)</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="blank"></button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="blank"></button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="blank"></button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="zero" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" style="grid-column: span 2;" onclick="calculate()">=</button>
      </div>

    </div>
  </div>

  <script>
    const display = document.getElementById("display");

    function appendValue(value) {
      if (display.value === "0" || display.value === "Error") {
        display.value = value;
      } else {
        display.value += value;
      }
    }

    function clearDisplay() {
      display.value = "0";
    }

    function calculate() {
      try {
        let expression = display.value;

        // Only allow safe calculator characters
        if (!/^[0-9+\-*/().% ]+$/.test(expression)) {
          display.value = "Error";
          return;
        }

        display.value = Function('"use strict"; return (' + expression + ')')();
      } catch {
        display.value = "Error";
      }
    }

    function percent() {
      try {
        display.value = parseFloat(display.value) / 100;
      } catch {
        display.value = "Error";
      }
    }

    function toggleSign() {
      if (display.value === "0" || display.value === "Error") return;

      if (display.value.startsWith("-")) {
        display.value = display.value.substring(1);
      } else {
        display.value = "-" + display.value;
      }
    }

    // Keyboard support
    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if ("0123456789+-*/().".includes(key)) {
        appendValue(key);
      }

      if (key === "Enter") {
        calculate();
      }

      if (key === "Backspace") {
        display.value = display.value.length > 1
          ? display.value.slice(0, -1)
          : "0";
      }

      if (key === "Escape") {
        clearDisplay();
      }
    });
  </script>

</body>
</html>
